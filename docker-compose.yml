services:
  enterprise-rag:
    build:
      context: .
    image: enterprise-rag:latest
    container_name: enterprise-rag
    restart: unless-stopped
    ports:
      - "7860:7860"
    env_file:
      - .env
    volumes:
      # 持久化向量数据和模型文件
      - ./data:/app/data
      - ./models:/app/models
    # 资源配置（可选，根据服务器规格调整）
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
