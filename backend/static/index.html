<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<title>企业知识库问答系统</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: rgba(255, 255, 255, 0.05);
    --glass: rgba(255, 255, 255, 0.08);
    --glass-hover: rgba(255, 255, 255, 0.12);
    --border: rgba(255, 255, 255, 0.1);
    --text: #e2e8f0;
    --text-secondary: #94a3b8;
    --accent: #3b82f6;
    --accent-glow: rgba(59, 130, 246, 0.3);
    --user-bubble: rgba(59, 130, 246, 0.25);
    --ai-bubble: rgba(255, 255, 255, 0.06);
    --error: #ef4444;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ===== 顶部导航栏 ===== */
  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  .navbar-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .dept-input-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dept-label {
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  .dept-input {
    width: 160px;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .dept-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .dept-input::placeholder {
    color: #64748b;
  }

  /* ===== 中部聊天区 ===== */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar {
    width: 6px;
  }

  .chat-area::-webkit-scrollbar-track {
    background: transparent;
  }

  .chat-area::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
  }

  /* ===== 消息气泡 ===== */
  .message {
    display: flex;
    flex-direction: column;
    max-width: 75%;
    animation: fadeIn 0.3s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    align-self: flex-end;
    align-items: flex-end;
  }

  .message.assistant {
    align-self: flex-start;
  }

  .bubble {
    padding: 12px 18px;
    border-radius: var(--radius);
    line-height: 1.6;
    font-size: 14px;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(59, 130, 246, 0.2);
    border-bottom-right-radius: 4px;
  }

  .message.assistant .bubble {
    background: var(--ai-bubble);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .message-label {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 4px;
    padding: 0 6px;
  }

  .message.assistant .bubble.error {
    border-color: rgba(239, 68, 68, 0.3);
    color: var(--error);
  }

  /* ===== 底部输入区 ===== */
  .input-area {
    padding: 16px 24px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .msg-input {
    flex: 1;
    padding: 12px 18px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    resize: none;
    outline: none;
    min-height: 46px;
    max-height: 150px;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .msg-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .msg-input::placeholder {
    color: #64748b;
  }

  .send-btn {
    padding: 12px 24px;
    border-radius: var(--radius);
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, box-shadow 0.2s, opacity 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover:not(:disabled) {
    background: #2563eb;
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ===== 上传按钮 ===== */
  .upload-area {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .upload-btn {
    padding: 12px 18px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, border-color 0.2s;
  }

  .upload-btn:hover {
    background: var(--glass-hover);
    border-color: var(--accent);
  }

  #file-input {
    display: none;
  }

  /* ===== 思考中动画 ===== */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 18px;
  }

  .typing-indicator span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-secondary);
    animation: typing 1.4s ease-in-out infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ===== 空状态 ===== */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text-secondary);
    gap: 12px;
  }

  .empty-state svg {
    opacity: 0.3;
    margin-bottom: 8px;
  }

  .empty-state p {
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- ===== 顶部导航栏 ===== -->
<nav class="navbar">
  <span class="navbar-title">企业知识库问答系统</span>
  <div class="dept-input-group">
    <span class="dept-label">部门：</span>
    <input
      type="text"
      class="dept-input"
      id="dept-input"
      placeholder="输入部门名称"
      maxlength="32"
      autocomplete="off"
    >
  </div>
</nav>

<!-- ===== 中部聊天区 ===== -->
<div class="chat-area" id="chat-area">
  <div class="empty-state" id="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <p>选择部门并输入问题，开始对话</p>
  </div>
</div>

<!-- ===== 底部输入区 ===== -->
<div class="input-area">
  <div class="upload-area">
    <button class="upload-btn" id="upload-btn" title="上传知识文档">📄 上传</button>
    <input type="file" id="file-input" accept=".txt,.pdf,.docx,.md,.csv">
  </div>

  <textarea
    class="msg-input"
    id="msg-input"
    placeholder="输入你的问题… (Enter 发送 / Shift+Enter 换行)"
    rows="1"
  ></textarea>

  <button class="send-btn" id="send-btn">发送</button>
</div>

<script>
(function () {
  // ===== DOM 引用 =====
  const chatArea = document.getElementById("chat-area");
  const emptyState = document.getElementById("empty-state");
  const deptInput = document.getElementById("dept-input");
  const msgInput = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");
  const uploadBtn = document.getElementById("upload-btn");
  const fileInput = document.getElementById("file-input");

  let currentEventSource = null;
  let isStreaming = false;

  // ===== localStorage 记住部门 =====
  const savedDept = localStorage.getItem("rag_dept");
  if (savedDept) {
    deptInput.value = savedDept;
  }

  deptInput.addEventListener("input", () => {
    localStorage.setItem("rag_dept", deptInput.value.trim());
  });

  // ===== 自动调整 textarea 高度 =====
  msgInput.addEventListener("input", () => {
    msgInput.style.height = "auto";
    msgInput.style.height = Math.min(msgInput.scrollHeight, 150) + "px";
  });

  // ===== 滚动到底部 =====
  function scrollToBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  // ===== 清空空状态 =====
  function hideEmptyState() {
    if (emptyState) emptyState.style.display = "none";
  }

  // ===== 添加消息气泡 =====
  function addMessage(role, content) {
    hideEmptyState();
    const div = document.createElement("div");
    div.className = `message ${role}`;

    const label = document.createElement("div");
    label.className = "message-label";
    label.textContent = role === "user" ? "你" : "AI 助手";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;

    div.appendChild(label);
    div.appendChild(bubble);
    chatArea.appendChild(div);
    scrollToBottom();
    return { div, bubble };
  }

  // ===== 添加思考中动画 =====
  function addTypingIndicator() {
    hideEmptyState();
    const div = document.createElement("div");
    div.className = "message assistant";
    div.id = "typing-msg";

    const label = document.createElement("div");
    label.className = "message-label";
    label.textContent = "AI 助手";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

    div.appendChild(label);
    div.appendChild(bubble);
    chatArea.appendChild(div);
    scrollToBottom();
    return div;
  }

  function removeTypingIndicator() {
    const el = document.getElementById("typing-msg");
    if (el) el.remove();
  }

  // ===== 设置发送状态 =====
  function setSending(disabled) {
    isStreaming = disabled;
    sendBtn.disabled = disabled;
    msgInput.disabled = disabled;
    if (disabled) {
      sendBtn.textContent = "思考中…";
    } else {
      sendBtn.textContent = "发送";
    }
  }

  // ===== 获取/校验部门 =====
  function getDepartment() {
    const dept = deptInput.value.trim();
    if (!dept) {
      alert("请先输入部门名称");
      return null;
    }
    return dept;
  }

  // ===== SSE 流式请求 =====
  function sendMessage() {
    const query = msgInput.value.trim();
    const department = getDepartment();
    if (!department || !query) return;

    // 添加用户消息
    addMessage("user", query);
    msgInput.value = "";
    msgInput.style.height = "auto";

    // 显示思考动画
    addTypingIndicator();
    setSending(true);

    // 构建 SSE URL
    const params = new URLSearchParams({ query, department });
    const url = `/chat/stream?${params.toString()}`;

    // 关闭之前的连接
    if (currentEventSource) {
      currentEventSource.close();
    }

    const es = new EventSource(url);
    currentEventSource = es;

    let aiBubbleRef = null;
    let aiDiv = null;
    let firstChunk = true;

    es.onmessage = (event) => {
      const data = event.data;

      if (data === "[DONE]") {
        // 流式完成
        es.close();
        currentEventSource = null;
        setSending(false);
        return;
      }

      if (data.startsWith("[ERROR]")) {
        // 错误处理
        const errMsg = data.slice(8);
        removeTypingIndicator();
        const { bubble } = addMessage("assistant", errMsg);
        bubble.classList.add("error");
        es.close();
        currentEventSource = null;
        setSending(false);
        return;
      }

      // 第一个文本块：替换思考动画为实际气泡
      if (firstChunk) {
        firstChunk = false;
        removeTypingIndicator();
        const result = addMessage("assistant", data);
        aiDiv = result.div;
        aiBubbleRef = result.bubble;
      } else if (aiBubbleRef) {
        // 追加文本
        aiBubbleRef.textContent += data;
        scrollToBottom();
      }
    };

    es.onerror = () => {
      // EventSource 在连接失败或关闭时会触发 error
      es.close();
      currentEventSource = null;
      if (firstChunk) {
        // 从未收到数据，连接本身失败
        removeTypingIndicator();
        addMessage("assistant", "连接失败，请稍后重试");
      }
      setSending(false);
    };
  }

  // ===== 发送按钮 =====
  sendBtn.addEventListener("click", sendMessage);

  // ===== Enter / Shift+Enter =====
  msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!isStreaming) sendMessage();
    }
  });

  // ===== 文件上传 =====
  uploadBtn.addEventListener("click", () => {
    const dept = getDepartment();
    if (!dept) return;
    fileInput.click();
  });

  fileInput.addEventListener("change", async () => {
    const file = fileInput.files[0];
    if (!file) return;

    const department = getDepartment();
    if (!department) {
      fileInput.value = "";
      return;
    }

    // 显示上传中
    uploadBtn.disabled = true;
    uploadBtn.textContent = "⏳ 上传中…";

    try {
      const formData = new FormData();
      formData.append("file", file);

      const res = await fetch(`/upload?department=${encodeURIComponent(department)}`, {
        method: "POST",
        body: formData,
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || "上传失败");
      }

      const data = await res.json();
      // 在聊天区显示系统消息
      hideEmptyState();
      const sysDiv = document.createElement("div");
      sysDiv.style.cssText = "text-align:center;color:#64748b;font-size:12px;padding:8px;";
      sysDiv.textContent = `📎 ${data.message || "上传成功"}`;
      chatArea.appendChild(sysDiv);
      scrollToBottom();
    } catch (err) {
      alert(`上传失败: ${err.message}`);
    } finally {
      uploadBtn.disabled = false;
      uploadBtn.textContent = "📄 上传";
      fileInput.value = "";
    }
  });
})();
</script>

</body>
</html>
