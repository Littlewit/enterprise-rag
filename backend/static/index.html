<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<title>企业知识库问答系统</title>
<style>
  /* ===== TDesign 风格设计令牌 ===== */
  :root {
    /* 品牌色 */
    --td-brand-color: #0052d9;
    --td-brand-color-hover: #266fe8;
    --td-brand-color-active: #0034b5;
    --td-brand-color-light: rgba(0, 82, 217, 0.12);

    /* 背景色系 — 深色主题 */
    --td-bg-color-page: #0f172a;
    --td-bg-color-container: rgba(255, 255, 255, 0.05);
    --td-bg-color-container-hover: rgba(255, 255, 255, 0.08);
    --td-bg-color-component: rgba(255, 255, 255, 0.06);
    --td-bg-color-glass: rgba(15, 23, 42, 0.75);

    /* 边框 */
    --td-border-color: rgba(255, 255, 255, 0.08);
    --td-border-color-hover: rgba(0, 82, 217, 0.4);

    /* 文字 */
    --td-text-color-primary: #e2e8f0;
    --td-text-color-secondary: #94a3b8;
    --td-text-color-placeholder: #64748b;
    --td-text-color-disabled: #475569;

    /* 功能性颜色 */
    --td-error-color: #f85149;
    --td-success-color: #3fb950;
    --td-warning-color: #d29922;

    /* 圆角 (TDesign 规范) */
    --td-radius-default: 6px;
    --td-radius-medium: 9px;
    --td-radius-large: 12px;
    --td-radius-extraLarge: 16px;

    /* 阴影 */
    --td-shadow-focus: 0 0 0 2px rgba(0, 82, 217, 0.25);

    /* 间距 (4px 倍数) */
    --td-size-1: 4px;
    --td-size-2: 8px;
    --td-size-3: 12px;
    --td-size-4: 16px;
    --td-size-5: 20px;
    --td-size-6: 24px;
    --td-size-8: 32px;

    /* 气泡颜色 */
    --bubble-user: rgba(0, 82, 217, 0.20);
    --bubble-user-border: rgba(0, 82, 217, 0.25);
    --bubble-ai: rgba(255, 255, 255, 0.05);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--td-bg-color-page);
    color: var(--td-text-color-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    line-height: 1.5;
  }

  /* ===== 顶部导航栏 ===== */
  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: var(--td-bg-color-glass);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--td-border-color);
    flex-shrink: 0;
    z-index: 10;
  }

  .navbar-title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, #4f8ff7, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .dept-input-group {
    display: flex;
    align-items: center;
    gap: var(--td-size-2);
  }

  .dept-label {
    font-size: 13px;
    color: var(--td-text-color-secondary);
    white-space: nowrap;
  }

  .dept-input {
    width: 160px;
    padding: 8px 12px;
    border-radius: var(--td-radius-default);
    border: 1px solid var(--td-border-color);
    background: var(--td-bg-color-container);
    color: var(--td-text-color-primary);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .dept-input:focus {
    border-color: var(--td-brand-color);
    box-shadow: var(--td-shadow-focus);
  }

  .dept-input::placeholder {
    color: var(--td-text-color-placeholder);
  }

  /* ===== 主内容区 ===== */
  .main-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
    /* 水平居中：chat + input 整体约束宽度 */
    align-items: center;
  }

  /* ===== 中部聊天区 ===== */
  .chat-area {
    flex: 1 1 auto;
    overflow-y: auto;
    min-height: 0;
    width: 100%;
    max-width: 860px;
    padding: var(--td-size-5) var(--td-size-6);
    display: flex;
    flex-direction: column;
    gap: var(--td-size-4);
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar {
    width: 6px;
  }

  .chat-area::-webkit-scrollbar-track {
    background: transparent;
  }

  .chat-area::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.08);
    border-radius: 3px;
  }

  .chat-area::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.14);
  }

  /* ===== 消息气泡 ===== */
  .message {
    display: flex;
    flex-direction: column;
    max-width: 75%;
    animation: fadeIn 0.3s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    align-self: flex-end;
    align-items: flex-end;
  }

  .message.assistant {
    align-self: flex-start;
  }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--td-radius-large);
    line-height: 1.6;
    font-size: 14px;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .message.user .bubble {
    background: var(--bubble-user);
    border: 1px solid var(--bubble-user-border);
    border-bottom-right-radius: var(--td-radius-default);
  }

  .message.assistant .bubble {
    background: var(--bubble-ai);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--td-border-color);
    border-bottom-left-radius: var(--td-radius-default);
  }

  .message-label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--td-text-color-secondary);
    margin-bottom: var(--td-size-1);
    padding: 0 4px;
  }

  .message-label svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  .message.assistant .bubble.error {
    border-color: rgba(248, 81, 73, 0.3);
    color: var(--td-error-color);
  }

  /* ===== 底部输入区 ===== */
  .input-wrapper {
    width: 100%;
    padding: var(--td-size-4) var(--td-size-6);
    border-top: 1px solid var(--td-border-color);
    display: flex;
    justify-content: center;
  }
  .input-area {
    width: 100%;
    max-width: 860px;
    background: var(--td-bg-color-glass);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    flex-shrink: 0;
    display: flex;
    gap: var(--td-size-3);
    align-items: flex-end;
  }

  .msg-input {
    flex: 1;
    padding: 10px 16px;
    border-radius: var(--td-radius-medium);
    border: 1px solid var(--td-border-color);
    background: var(--td-bg-color-component);
    color: var(--td-text-color-primary);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 150px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .msg-input:focus {
    border-color: var(--td-brand-color);
    box-shadow: var(--td-shadow-focus);
  }

  .msg-input::placeholder {
    color: var(--td-text-color-placeholder);
  }

  .msg-input:disabled {
    cursor: not-allowed;
    opacity: 0.5;
  }

  .send-btn {
    padding: 10px 24px;
    min-height: 44px;
    border-radius: var(--td-radius-medium);
    border: none;
    background: var(--td-brand-color);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, box-shadow 0.2s, opacity 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover:not(:disabled) {
    background: var(--td-brand-color-hover);
    box-shadow: 0 2px 12px rgba(0, 82, 217, 0.35);
  }

  .send-btn:active:not(:disabled) {
    background: var(--td-brand-color-active);
  }

  .send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ===== 上传按钮 ===== */
  .upload-area {
    display: flex;
    gap: var(--td-size-2);
    align-items: center;
  }

  .upload-btn {
    padding: 10px 16px;
    min-height: 44px;
    border-radius: var(--td-radius-medium);
    border: 1px solid var(--td-border-color);
    background: var(--td-bg-color-container);
    color: var(--td-text-color-primary);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, border-color 0.2s;
  }

  .upload-btn:hover:not(:disabled) {
    background: var(--td-bg-color-container-hover);
    border-color: var(--td-border-color-hover);
  }

  .upload-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  #file-input {
    display: none;
  }

  /* ===== 思考中动画 ===== */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 4px 0;
  }

  .typing-indicator span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--td-text-color-secondary);
    animation: typing 1.4s ease-in-out infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ===== 空状态 ===== */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    padding: var(--td-size-8) 0;
    color: var(--td-text-color-secondary);
    gap: var(--td-size-3);
  }

  .empty-state svg {
    opacity: 0.25;
    margin-bottom: var(--td-size-1);
  }

  .empty-state p {
    font-size: 14px;
  }

  /* ===== 系统消息 ===== */
  .sys-msg {
    text-align: center;
    color: var(--td-text-color-secondary);
    font-size: 12px;
    padding: var(--td-size-2);
  }
</style>
</head>
<body>

<!-- ===== 顶部导航栏 ===== -->
<nav class="navbar">
  <span class="navbar-title">企业知识库问答系统</span>
  <div class="dept-input-group">
    <span class="dept-label">部门：</span>
    <input
      type="text"
      class="dept-input"
      id="dept-input"
      placeholder="输入部门名称"
      maxlength="32"
      autocomplete="off"
    >
  </div>
</nav>

<!-- ===== 主内容区（整体居中） ===== -->
<div class="main-wrapper">

  <!-- ===== 中部聊天区 ===== -->
  <div class="chat-area" id="chat-area">
    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>选择部门并输入问题，开始对话</p>
    </div>
  </div>

  <!-- ===== 底部输入区 ===== -->
  <div class="input-wrapper">
      <div class="input-area">
        <div class="upload-area">
          <button class="upload-btn" id="upload-btn" title="上传知识文档">📄 上传</button>
          <input type="file" id="file-input" accept=".txt,.pdf,.docx,.md,.csv">
        </div>
    
        <textarea
          class="msg-input"
          id="msg-input"
          placeholder="输入你的问题… (Enter 发送 / Shift+Enter 换行)"
          rows="1"
        ></textarea>
    
        <button class="send-btn" id="send-btn">发送</button>
      </div>
  </div>

</div>

<script>
(function () {
  // ===== DOM 引用 =====
  const chatArea = document.getElementById("chat-area");
  const emptyState = document.getElementById("empty-state");
  const deptInput = document.getElementById("dept-input");
  const msgInput = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");
  const uploadBtn = document.getElementById("upload-btn");
  const fileInput = document.getElementById("file-input");

  let currentEventSource = null;
  let isStreaming = false;

  // ===== localStorage 记住部门 =====
  const savedDept = localStorage.getItem("rag_dept");
  if (savedDept) {
    deptInput.value = savedDept;
  }

  deptInput.addEventListener("input", () => {
    localStorage.setItem("rag_dept", deptInput.value.trim());
  });

  // ===== 自动调整 textarea 高度 =====
  msgInput.addEventListener("input", () => {
    msgInput.style.height = "auto";
    msgInput.style.height = Math.min(msgInput.scrollHeight, 150) + "px";
  });

  // ===== 滚动到底部 =====
  function scrollToBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  // ===== 清空空状态 =====
  function hideEmptyState() {
    if (emptyState) emptyState.style.display = "none";
  }

  // ===== 添加消息气泡 =====
  function addMessage(role, content) {
    hideEmptyState();
    const div = document.createElement("div");
    div.className = `message ${role}`;

    const label = document.createElement("div");
    label.className = "message-label";
    label.innerHTML = role === "user"
      ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>我`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6-4.8-6 4.8 2.4-7.2-6-4.8h7.6z"/></svg>AI 助手`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;

    div.appendChild(label);
    div.appendChild(bubble);
    chatArea.appendChild(div);
    scrollToBottom();
    return { div, bubble };
  }

  // ===== 添加思考中动画 =====
  function addTypingIndicator() {
    hideEmptyState();
    const div = document.createElement("div");
    div.className = "message assistant";
    div.id = "typing-msg";

    const label = document.createElement("div");
    label.className = "message-label";
    label.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6-4.8-6 4.8 2.4-7.2-6-4.8h7.6z"/></svg>AI 助手';

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

    div.appendChild(label);
    div.appendChild(bubble);
    chatArea.appendChild(div);
    scrollToBottom();
    return div;
  }

  function removeTypingIndicator() {
    const el = document.getElementById("typing-msg");
    if (el) el.remove();
  }

  // ===== 设置发送状态 =====
  function setSending(disabled) {
    isStreaming = disabled;
    sendBtn.disabled = disabled;
    msgInput.disabled = disabled;
    if (disabled) {
      sendBtn.textContent = "思考中…";
    } else {
      sendBtn.textContent = "发送";
    }
  }

  // ===== 获取/校验部门 =====
  function getDepartment() {
    const dept = deptInput.value.trim();
    if (!dept) {
      alert("请先输入部门名称");
      return null;
    }
    return dept;
  }

  // ===== SSE 流式请求 =====
  function sendMessage() {
    const query = msgInput.value.trim();
    const department = getDepartment();
    if (!department || !query) return;

    // 添加用户消息
    addMessage("user", query);
    msgInput.value = "";
    msgInput.style.height = "auto";

    // 显示思考动画
    addTypingIndicator();
    setSending(true);

    // 构建 SSE URL
    const params = new URLSearchParams({ query, department });
    const url = `/chat/stream?${params.toString()}`;

    // 关闭之前的连接
    if (currentEventSource) {
      currentEventSource.close();
    }

    const es = new EventSource(url);
    currentEventSource = es;

    let aiBubbleRef = null;
    let aiDiv = null;
    let firstChunk = true;

    es.onmessage = (event) => {
      const data = event.data;

      if (data === "[DONE]") {
        es.close();
        currentEventSource = null;
        setSending(false);
        return;
      }

      if (data.startsWith("[ERROR]")) {
        const errMsg = data.slice(8);
        removeTypingIndicator();
        const { bubble } = addMessage("assistant", errMsg);
        bubble.classList.add("error");
        es.close();
        currentEventSource = null;
        setSending(false);
        return;
      }

      // 第一个文本块：替换思考动画为实际气泡
      if (firstChunk) {
        firstChunk = false;
        removeTypingIndicator();
        const result = addMessage("assistant", data);
        aiDiv = result.div;
        aiBubbleRef = result.bubble;
      } else if (aiBubbleRef) {
        aiBubbleRef.textContent += data;
        scrollToBottom();
      }
    };

    es.onerror = () => {
      es.close();
      currentEventSource = null;
      if (firstChunk) {
        removeTypingIndicator();
        addMessage("assistant", "连接失败，请稍后重试");
      }
      setSending(false);
    };
  }

  // ===== 发送按钮 =====
  sendBtn.addEventListener("click", sendMessage);

  // ===== Enter / Shift+Enter =====
  msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!isStreaming) sendMessage();
    }
  });

  // ===== 文件上传 =====
  uploadBtn.addEventListener("click", () => {
    const dept = getDepartment();
    if (!dept) return;
    fileInput.click();
  });

  fileInput.addEventListener("change", async () => {
    const file = fileInput.files[0];
    if (!file) return;

    const department = getDepartment();
    if (!department) {
      fileInput.value = "";
      return;
    }

    // 显示上传中
    uploadBtn.disabled = true;
    uploadBtn.textContent = "⏳ 上传中…";

    try {
      const formData = new FormData();
      formData.append("file", file);

      const res = await fetch(`/upload?department=${encodeURIComponent(department)}`, {
        method: "POST",
        body: formData,
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || "上传失败");
      }

      const data = await res.json();
      // 在聊天区显示系统消息
      hideEmptyState();
      const sysDiv = document.createElement("div");
      sysDiv.className = "sys-msg";
      sysDiv.textContent = `📎 ${data.message || "上传成功"}`;
      chatArea.appendChild(sysDiv);
      scrollToBottom();
    } catch (err) {
      alert(`上传失败: ${err.message}`);
    } finally {
      uploadBtn.disabled = false;
      uploadBtn.textContent = "📄 上传";
      fileInput.value = "";
    }
  });
})();
</script>

</body>
</html>
